name: Build & Deploy App
on:
  workflow_dispatch: 
#  push:
#    branches:
#     - main
env:
  FRONT_S3_BUCKET: ${{ secrets.FRONT_S3_BUCKET }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
jobs:
  build_frontend:
    name: Build Frontend and Upload to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm ci
      - name: Build Frontend
        working-directory: ./client
        run: CI=false npm run build

      - name: Debug - List files        # ← ADD HERE
        run: |
          ls -la
          ls -la ./client || echo "client folder not found"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Sync Build to S3
        run: |
          aws s3 sync ./client/build s3://$FRONT_S3_BUCKET --delete
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
  deploy_backend:
    name: Build, Push to ECR & Deploy to EC2
    runs-on: ubuntu-latest
    needs: build_frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1
      - name: Build, Tag, Push Docker Image
        working-directory: ./server
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          echo "Using registry: $ECR_REGISTRY"
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
      - name: Add SSH known_hosts
        run: |
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
      - name: Deploy Backend on EC2
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          ssh -i ~/.ssh/ec2_key $EC2_USER@$EC2_HOST << EOF
            echo "Logging into ECR..."
            aws ecr get-login-password --region $AWS_REGION | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            echo "Pulling latest image..."
            sudo docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest || exit 1
            echo "Stopping old container..."
            sudo docker stop blog-backend || true
            sudo docker rm blog-backend || true
            echo "Starting new container..."
            sudo docker run -d \
              --name blog-backend \
              -p 8080:5001 \
              --restart unless-stopped \
              $ECR_REGISTRY/$ECR_REPOSITORY:latest
            echo "Deployment successful!"
          EOF

  
        
      
